name: build and test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  run-5-2:
    name: OCaml 5.2
    timeout-minutes: 10
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@main
      - run: make update-submodules
      - run: docker build . -f dep/Dockerfile.5.2
  run-5-3:
    name: OCaml 5.3
    timeout-minutes: 10
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@main
      - run: make update-submodules
      - run: docker build . -f dep/Dockerfile.5.3
  tsc:
    name: tsc
    runs-on: [ubuntu-latest]
    steps:
    - uses: actions/checkout@main
    - name: install node
      uses: actions/setup-node@v1
      with:
        node-version: 20
    - run: npm install tsc
    - name: tsc
      run: make -C src/ts check
  cargo-build:
    name: cargo build
    runs-on: [ubuntu-latest]
    steps:
    - uses: actions/checkout@main
    - run: make update-submodules
    - uses: dtolnay/rust-toolchain@stable
    - name: cargo build
      run: cargo build
      working-directory: src/rust/lib
  pyright:
    name: pyright
    runs-on: [ubuntu-latest]
    steps:
    - uses: actions/checkout@main
    - uses: astral-sh/setup-uv@v5
    - run: cd src/py && make typecheck
